<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>L-System 3D</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #overlay {
            position: fixed;
            top: 1rem;
            right: 1rem;
            width: 320px;
            z-index: 100;
            max-height: 95vh;
            overflow-y: auto;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
        }
    }
    </script>
</head>

<body>

    <!-- Bootstrap overlay panel -->
    <div id="overlay">
        <div class="card shadow">
            <div class="card-header d-flex justify-content-between align-items-center">
                <strong>L-System Editor</strong>
                <button class="btn btn-sm btn-outline-secondary" id="btn-collapse" type="button"
                    data-bs-toggle="collapse" data-bs-target="#panel-body">
                    ▾
                </button>
            </div>

            <div class="collapse show" id="panel-body">
                <div class="card-body">

                    <!-- Axiom -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Axiom</label>
                        <input id="axiom-input" class="form-control form-control-sm" value="X">
                    </div>

                    <!-- Iterations -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Iterations</label>
                        <input id="iters-input" type="number" min="1" max="10" class="form-control form-control-sm" value="6">
                    </div>

                    <!-- Symbol Legend -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Symbol Legend</label>
                        <ul class="list-group list-group-sm small">
                            <li class="list-group-item"><strong>F</strong> → Move forward (draw line)</li>
                            <li class="list-group-item"><strong>+</strong> → Turn left (yaw +ANGLE)</li>
                            <li class="list-group-item"><strong>-</strong> → Turn right (yaw -ANGLE)</li>
                            <li class="list-group-item"><strong>^</strong> → Pitch up</li>
                            <li class="list-group-item"><strong>&amp;</strong> → Pitch down</li>
                            <li class="list-group-item"><strong>/</strong> → Roll left</li>
                            <li class="list-group-item"><strong>\</strong> → Roll right</li>
                            <li class="list-group-item"><strong>[</strong> → Save state (push)</li>
                            <li class="list-group-item"><strong>]</strong> → Restore state (pop)</li>
                        </ul>
                    </div>

                    <!-- Rules -->
                    <label class="form-label fw-semibold">Rules</label>
                    <div id="rules-container" class="mb-2"></div>

                    <button id="btn-add-rule" class="btn btn-sm btn-outline-primary w-100 mb-2" type="button">
                        + Add Rule
                    </button>

                    <!-- Status -->
                    <div id="status" class="form-text text-muted"></div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script type="module" src="index.js"></script>
</body>

</html>
